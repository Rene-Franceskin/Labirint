<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Block Blast Maze</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <main class="game-container">
    <h1>Block Blast Maze</h1>
    <p>
  Premik: <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> ali puščice
  <span id="infoBtn">ℹ️</span>
</p>

    <canvas id="mazeCanvas" aria-label="Labirint"></canvas>

    <p id="status"></p>

    <div class="controls">
      <button id="resetBtn" type="button">Nov labirint</button>
      <button id="solutionBtn" type="button">Prikaži rešitev</button>
    </div>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
